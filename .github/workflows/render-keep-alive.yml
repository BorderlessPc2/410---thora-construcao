# Ping periódico no Cloud Run (min-instances=0) para reduzir cold start.
# Secret opcional CLOUD_RUN_HEALTH_URL sobrescreve a URL padrão.

name: API keep-alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

env:
  DEFAULT_HEALTH_URL: https://thora-api-333573409559.us-central1.run.app/health

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /health (com retry)
        env:
          CLOUD_RUN_HEALTH_URL: ${{ secrets.CLOUD_RUN_HEALTH_URL }}
        run: |
          URL="${CLOUD_RUN_HEALTH_URL:-$DEFAULT_HEALTH_URL}"
          echo "Ping → $URL"
          for attempt in 1 2 3; do
            if curl -fsS --max-time 90 "$URL"; then
              echo "OK — tentativa $attempt — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              exit 0
            fi
            echo "Falha na tentativa $attempt — aguardando 15s..."
            sleep 15
          done
          echo "API não respondeu após 3 tentativas (pode estar acordando)."
          exit 1
